<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hibilog Gallery</title>

<style>
body{
  font-family:sans-serif;
  max-width:900px;
  margin:40px auto;
  padding:20px;
  background:#faf8f5;
  color:#5a5a5a;
  text-align:center;
}

.logo{
  margin-top:50px;
  margin-bottom:30px;
}

.logo-text{
  font-size:42px;
  letter-spacing:0.12em;
  font-weight:300;
}

.message{
  margin-bottom:25px;
}

#gallery{
  display:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.grid img{
  width:100%;
  border-radius:12px;
}

input{
  padding:12px;
  width:250px;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  padding:12px 24px;
  border:none;
  border-radius:8px;
  background:#d8cfc2;
  color:white;
  cursor:pointer;
}

.download-btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 28px;
  background:#d8cfc2;
  color:white;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="logo">
  <div class="logo-text">hibilog</div>
</div>

<div id="login">

<p class="message">
お写真の準備ができました。
</p>

<input
type="password"
id="pw"
placeholder="パスワード">

<br><br>

<button onclick="checkPassword()">
アルバムを開く
</button>

</div>

<div id="gallery">

<h2>koharu</h2>

<div class="grid">

<img src="_MUN0547.jpg">
<img src="_MUN0355.jpg">

</div>

<a
class="download-btn"
href="https://www.dropbox.com/scl/fo/00hfzl758b88bbm5fclod/AFLqDLU0WlKflxvODr38dwU?rlkey=6lgpov8n86vjtyrt9ygx73his&st=nmec3x0r&dl=0"
target="_blank">

すべてダウンロード

</a>

</div>

<script>

function checkPassword(){

const password = "koharu";

if(
document.getElementById("pw").value
=== password
){

document.getElementById("login").style.display="none";
document.getElementById("gallery").style.display="block";

}else{

alert("パスワードが違います");

}

}

</script>

</body>
</html>
